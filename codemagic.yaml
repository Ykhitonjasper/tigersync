workflows:
  app-store-release:
    name: App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: tigersync.xcodeproj
        XCODE_SCHEME: tigersync
        BUNDLE_ID: com.URIELALEJANDRORIOS.tigersync

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set up keychain for code signing
        script: keychain initialize

      - name: Prepare certificate private key
        script: |
          set -e
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "Missing CERTIFICATE_PRIVATE_KEY in app_store_credentials."
            exit 1
          fi

          KEY_FILE=/tmp/certificate_key.pem
          # Restore escaped newlines if Codemagic stored the key on one line
          printf '%b' "$(echo "$CERTIFICATE_PRIVATE_KEY" | sed 's/\\n/\n/g')" > "$KEY_FILE"

          if ! openssl rsa -in "$KEY_FILE" -check -noout 2>/dev/null; then
            echo "Converting PKCS#8 private key to RSA PEM format..."
            openssl rsa -in "$KEY_FILE" -out "${KEY_FILE}.rsa" 2>/dev/null || true
            if [ -f "${KEY_FILE}.rsa" ]; then
              mv "${KEY_FILE}.rsa" "$KEY_FILE"
            fi
          fi

          if ! openssl rsa -in "$KEY_FILE" -check -noout 2>/dev/null; then
            echo "CERTIFICATE_PRIVATE_KEY is not a valid RSA private key."
            echo "Regenerate: openssl genrsa -out dist.key 2048"
            echo "Paste full dist.key into Codemagic (Secret), including BEGIN/END lines."
            echo "First line of stored value:"
            head -1 "$KEY_FILE"
            exit 1
          fi

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/certificate_key.pem

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --archive-method app-store

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_app_store: true
